# Full stack: nginx (TLS termination + cert acquisition) + docker-mailserver
# (SMTP/IMAP) + mail-api (control plane). Configure via root `.env` (see
# `.env.example`).

# Shared log-rotation policy (json-file, capped) applied to every service so no
# container's logs can grow unbounded on the host.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  nginx:
    image: jonasal/nginx-certbot:6-alpine
    restart: unless-stopped
    container_name: nginx
    mem_limit: 128m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    env_file:
      - ./nginx/nginx-certbot.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_secrets:/etc/letsencrypt
      - ./nginx/user_conf.d:/etc/nginx/user_conf.d
      # mail-api writes per-domain vhosts here (Phase 8)
      - ./mailserver-api/data/nginx-generated:/etc/nginx/user_conf.d/generated
    networks:
      - web_network

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:15.1.0
    container_name: mailserver
    hostname: ${MAIL_HOSTNAME:-mail.example.com}
    env_file:
      - ./.env
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - ./docker-data/dms/mail-data/:/var/mail/
      - ./docker-data/dms/mail-state/:/var/mail-state/
      - ./docker-data/dms/mail-logs/:/var/log/mail/
      - ./docker-data/dms/config/:/tmp/docker-mailserver/
      - nginx_secrets:/etc/letsencrypt:ro
      - /etc/localtime:/etc/localtime:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    stop_grace_period: 1m
    # mem_limit intentionally unset: the Rspamd/ClamAV footprint varies widely and
    # a cap that's too low OOM-kills mail delivery. Set one (e.g. 3g) once you know
    # your host's steady-state usage.
    logging: *default-logging
    networks:
      - web_network

  # Least-privilege gateway to the Docker API. mail-api talks to this over TCP
  # instead of mounting the raw, root-equivalent /var/run/docker.sock. Only the
  # capabilities mail-api needs are enabled (inspect containers, run exec,
  # restart). The raw socket is mounted read-only and never exposed to mail-api.
  docker-socket-proxy:
    # Pinned: the most security-sensitive image in the stack — bump deliberately,
    # not implicitly via :latest.
    image: ghcr.io/tecnativa/docker-socket-proxy:0.3.0
    container_name: docker-socket-proxy
    restart: unless-stopped
    mem_limit: 64m
    logging: *default-logging
    environment:
      - CONTAINERS=1 # inspect / list containers + create exec
      - EXEC=1 # start/inspect exec (doveadm/rspamc/tee/postqueue/…)
      - POST=1 # allow the POST verbs the above require
      - ALLOW_RESTARTS=1 # container restart (engine page)
      # /version is allowed by default (dockerode API negotiation). Everything
      # else stays denied: images, networks, volumes, swarm, secrets, host, …
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker_proxy
    read_only: true
    tmpfs:
      - /run
      # docker-socket-proxy (haproxy) regenerates its config here on startup;
      # read_only rootfs would otherwise EROFS on /usr/local/etc/haproxy/haproxy.cfg.
      - /usr/local/etc/haproxy

  mail-api:
    build: ./mailserver-api
    container_name: mail-api
    restart: unless-stopped
    env_file:
      - ./mailserver-api/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/app/data/data.db
      - NGINX_GENERATED_DIR=/app/nginx-generated
      - DMS_CONTAINER_NAME=mailserver
      - NGINX_CONTAINER_NAME=nginx
      # Connect to the Docker API through the socket-proxy — no raw socket mount.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - TRUST_PROXY=1
    volumes:
      - ./mailserver-api/data:/app/data
      - ./mailserver-api/data/nginx-generated:/app/nginx-generated
    # Runs as USER node already; drop every capability and block privilege
    # escalation so a mail-api compromise has minimal reach.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    logging: *default-logging
    networks:
      - web_network
      - docker_proxy
    # Start-order only (not service_healthy): docker-mailserver is intentionally
    # unhealthy on first boot until the first mailbox exists, and that mailbox is
    # created through mail-api — gating on health would deadlock the bootstrap.
    depends_on:
      - mailserver
      - nginx
      - docker-socket-proxy

volumes:
  nginx_secrets:
    external: true
    name: nginx_nginx_secrets

networks:
  web_network:
    driver: bridge
    name: web_network
  # Isolated network carrying only mail-api ↔ docker-socket-proxy traffic.
  docker_proxy:
    driver: bridge
    name: docker_proxy
    internal: true
