name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mailserver-api:
    name: mailserver-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mailserver-api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: mailserver-api/pnpm-lock.yaml

      - name: Install API dependencies
        run: pnpm install --frozen-lockfile

      - name: Install UI dependencies
        run: pnpm --dir ui install

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: API typecheck
        run: pnpm typecheck

      - name: UI typecheck
        run: pnpm --dir ui typecheck

      - name: Test
        run: pnpm test

      - name: Build (API + UI)
        run: pnpm build
